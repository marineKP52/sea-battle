<!DOCTYPE html>
<html lang="uk">
    <head>
        <title>Гра</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link type="image/x-icon" rel="icon" href="../img/battleship.png">
        <link rel="stylesheet" href="../css/reset.css">
        <link rel="stylesheet" href="../css/base-styles.css">
        <link rel="stylesheet" href="../css/header.css">
        <link rel="stylesheet" href="../css/footer.css">
        <link rel="stylesheet" href="../css/modals.css">
        <link rel="stylesheet" href="../css/game.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=Geologica:wght,CRSV@100..900,0&family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body class="modes-page">
        <header>
            <div class="header">          
                <nav>
                    <ul class="header__menu">
                        <li class="header__menu__item">                  
                            <a href="/"><img src="../img/profile-white.png" alt="">user123</a>
                        </li>
                        <li class="header__menu__item">
                            <a href="/">Вибір режимів</a>
                        </li>
                        <li class="header__menu__item">
                            <a href="/">Рейтинг світу</a>
                        </li>
                        <li class="header__menu__item">
                            <a href="/">Правила гри</a>
                        </li>
                        <li class="header__menu__item">
                            <a href="/">Про нас</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </header>

        <div class="main">
            <div class="main__board-column">
                <div class="main__board">

                </div>
            </div>
            <div class="main__info-column">
                <div class="modal__window modal__game-info">
                    <div class="modal__game-info__ships">
                        <div class="modal__game-info__item">
                            <img src="../img/one-ship.png" alt="">
                            <span>— 4 кораблі </span>
                        </div>
                        <div class="modal__game-info__item">
                            <img src="../img/two-ship.png" alt="">
                            <span>— 3 кораблі </span>
                        </div>
                        <div class="modal__game-info__item">
                            <img src="../img/three-ship.png" alt="">
                            <span>— 2 кораблі </span>
                        </div>
                        <div class="modal__game-info__item">
                            <img src="../img/four-ship.png" alt="">
                            <span>— 1 корабель</span>
                        </div>
                    </div>
                    <button type="submit" class="main-button modal__play__button" id="play">
                        Грати
                    </button>               
                </div>
            </div>
        </div>

        <footer>
            <div class="footer">
                <span class="footer__copy">&copy;2026 Розробники: VHRR</span>
            </div>
        </footer>


        <script type="module" src="../js/game-utilities.js"></script>
