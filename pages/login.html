<!DOCTYPE html>
<html lang="uk">
    <head>
        <title>Вхід</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link type="image/x-icon" rel="icon" href="../img/battleship.png">
        <link rel="stylesheet" href="../css/reset.css">
        <link rel="stylesheet" href="../css/base-styles.css">
        <link rel="stylesheet" href="../css/modals.css">
        <link rel="stylesheet" href="../css/login.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&family=Geologica:wght,CRSV@100..900,0&family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body class="login-page">
        <div class="modal">
            <div class="modal__window modal__login">
                <img src = "../img/user.png" class="user__main">
                <h1>Вхід в особистий акаунт</h1>
                <span class="modal__window__explanation">Будь ласка увійдіть, щоб продовжити</span>
                <form action="" method="" id="login-form">
                    <div class="modal__window__field">
                        <input type="text" name="login" placeholder="Введіть ваш логін">
                        <span class="modal__window__field__error-message hidden">
                            Логін повинен містити від 6 до 12 символів, може містити латиницю, 
                            цифри і _
                        </span>
                    </div>
                    <div class="modal__window__field">
                        <img src="../img/view.png" alt="" class="modal__window__field__eye view-img">
                        <input type="password" name="password" placeholder="Введіть ваш пароль">   
                        <span class="modal__window__field__error-message hidden">
                            Пароль повинен містити від 6 до 12 символів, латиницю, хоча б одну велику 
                            літеру, маленьку літеру, цифру і спецсимвол з ?!#$%
                        </span>                             
                    </div>                  
                    <button type="submit" class="main-button modal__login__button" id="login">
                        Увійти
                    </button>            
                </form>               
            </div>
        </div>

        <script type="module" src="../js/login.js"></script>
    </body>
</html>
